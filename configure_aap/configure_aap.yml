---
- name: Configure AAP for Windows certificate rotation demo
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    aap_base_url: "https://{{ lookup('env', 'AAP_HOSTNAME') }}"
    aap_username: "{{ lookup('env', 'AAP_USERNAME') }}"
    aap_password: "{{ lookup('env', 'AAP_PASSWORD') }}"
    aap_validate_certs: false
    aap_api: "{{ aap_base_url }}/api/controller/v2"
    eda_api: "{{ aap_base_url }}/api/eda/v1"

  pre_tasks:
    - name: Assert required AAP environment variables are set
      ansible.builtin.assert:
        that:
          - lookup('env', 'AAP_HOSTNAME') | length > 0
          - lookup('env', 'AAP_USERNAME') | length > 0
          - lookup('env', 'AAP_PASSWORD') | length > 0
        fail_msg: |
          Missing required environment variables. Please set:
            export AAP_HOSTNAME="your-aap-url.example.com"
            export AAP_USERNAME="atrotter"
            export AAP_PASSWORD="your-password"
            export AAP_PROTOCOL="http"
            export AAP_VALIDATE_CERTS="false"
            export GCP_SERVICE_ACCOUNT_JSON="$(cat path/to/service-account-key.json)"

    - name: Assert .env.demo exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../.env.demo"
      register: env_demo_stat

    - name: Fail if .env.demo is missing
      ansible.builtin.fail:
        msg: ".env.demo not found. Run infrastructure/provision_aws.yml first."
      when: not env_demo_stat.stat.exists

    - name: Read WINDOWS_PRIVATE_IP from .env.demo
      ansible.builtin.shell:
        cmd: "source {{ playbook_dir }}/../.env.demo && echo $WINDOWS_PRIVATE_IP"
      register: windows_ip_result
      changed_when: false

    - name: Read WINDOWS_ADMIN_PASSWORD from .env.demo
      ansible.builtin.shell:
        cmd: "source {{ playbook_dir }}/../.env.demo && echo $WINDOWS_ADMIN_PASSWORD"
      register: windows_pw_result
      changed_when: false

    - name: Set Windows facts
      ansible.builtin.set_fact:
        windows_private_ip: "{{ windows_ip_result.stdout | trim }}"
        windows_admin_password: "{{ windows_pw_result.stdout | trim }}"

    - name: Get GitHub repo URL
      ansible.builtin.command: gh repo view windows-cert-rotation-demo --json url -q .url
      register: git_repo_url_result
      changed_when: false

    - name: Set git repo URL fact
      ansible.builtin.set_fact:
        git_repo_url: "{{ git_repo_url_result.stdout | trim }}"

  tasks:
    # ---------------------------------------------------------------
    # Credential
    # ---------------------------------------------------------------
    - name: Get existing machine credential types
      ansible.builtin.uri:
        url: "{{ aap_api }}/credential_types/?name=Machine"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: cred_type_result

    - name: Set machine credential type ID
      ansible.builtin.set_fact:
        machine_cred_type_id: "{{ cred_type_result.json.results[0].id }}"

    - name: Get existing Windows Demo Credential
      ansible.builtin.uri:
        url: "{{ aap_api }}/credentials/?name=Windows+Demo+Credential"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_cred

    - name: Create Windows machine credential
      ansible.builtin.uri:
        url: "{{ aap_api }}/credentials/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "Windows Demo Credential"
          description: "Machine credential for Windows cert rotation demo"
          organization: 1
          credential_type: "{{ machine_cred_type_id }}"
          inputs:
            username: "Administrator"
            password: "{{ windows_admin_password }}"
        status_code: [200, 201]
      register: cred_result
      when: existing_cred.json.count == 0

    - name: Set credential ID fact
      ansible.builtin.set_fact:
        credential_id: >-
          {{
            cred_result.json.id
            if existing_cred.json.count == 0
            else existing_cred.json.results[0].id
          }}

    # ---------------------------------------------------------------
    # GCP Service Account Custom Credential Type + Credential
    # (skipped when GCP_SERVICE_ACCOUNT_JSON is not set)
    # ---------------------------------------------------------------
    - name: Check if GCP env var is set
      ansible.builtin.set_fact:
        gcp_json_available: "{{ lookup('env', 'GCP_SERVICE_ACCOUNT_JSON') | length > 0 }}"

    - name: Get existing GCP Service Account credential type
      ansible.builtin.uri:
        url: "{{ aap_api }}/credential_types/?name=GCP+Service+Account"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_gcp_cred_type

    - name: Create GCP Service Account credential type
      ansible.builtin.uri:
        url: "{{ aap_api }}/credential_types/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "GCP Service Account"
          description: "Writes service account JSON to a temp file and sets GOOGLE_APPLICATION_CREDENTIALS"
          kind: "cloud"
          inputs:
            fields:
              - id: gcp_service_account_json
                type: string
                label: "GCP Service Account JSON"
                secret: true
                multiline: true
            required:
              - gcp_service_account_json
          injectors:
            file:
              template: "{{ '{{' }} gcp_service_account_json {{ '}}' }}"
            env:
              GOOGLE_APPLICATION_CREDENTIALS: "{{ '{{' }} tower.filename {{ '}}' }}"
        status_code: [200, 201]
      register: gcp_cred_type_result
      when: existing_gcp_cred_type.json.count == 0

    - name: Set GCP credential type ID fact
      ansible.builtin.set_fact:
        gcp_cred_type_id: >-
          {{
            gcp_cred_type_result.json.id
            if existing_gcp_cred_type.json.count == 0
            else existing_gcp_cred_type.json.results[0].id
          }}

    - name: Get existing GCP Service Account credential
      ansible.builtin.uri:
        url: "{{ aap_api }}/credentials/?name=GCP+Service+Account+Credential"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_gcp_cred

    - name: Create GCP Service Account credential
      ansible.builtin.uri:
        url: "{{ aap_api }}/credentials/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "GCP Service Account Credential"
          description: "Service account key for Vertex AI access"
          organization: 1
          credential_type: "{{ gcp_cred_type_id }}"
          inputs:
            gcp_service_account_json: "{{ lookup('env', 'GCP_SERVICE_ACCOUNT_JSON') | to_json }}"
        status_code: [200, 201]
      register: gcp_cred_result
      when:
        - existing_gcp_cred.json.count == 0
        - gcp_json_available | bool

    - name: Set GCP credential ID fact
      ansible.builtin.set_fact:
        gcp_cred_id: >-
          {{
            gcp_cred_result.json.id
            if (existing_gcp_cred.json.count == 0 and gcp_json_available | bool)
            else existing_gcp_cred.json.results[0].id | default('')
          }}

    # ---------------------------------------------------------------
    # Inventory + Host
    # ---------------------------------------------------------------
    - name: Get existing Windows Demo Inventory
      ansible.builtin.uri:
        url: "{{ aap_api }}/inventories/?name=Windows+Demo+Inventory"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_inventory

    - name: Create Windows inventory
      ansible.builtin.uri:
        url: "{{ aap_api }}/inventories/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "Windows Demo Inventory"
          description: "Inventory for Windows cert rotation demo"
          organization: 1
        status_code: [200, 201]
      register: inventory_result
      when: existing_inventory.json.count == 0

    - name: Set inventory ID fact
      ansible.builtin.set_fact:
        inventory_id: >-
          {{
            inventory_result.json.id
            if existing_inventory.json.count == 0
            else existing_inventory.json.results[0].id
          }}

    - name: Get existing Windows host in inventory
      ansible.builtin.uri:
        url: "{{ aap_api }}/hosts/?name={{ windows_private_ip | urlencode }}&inventory={{ inventory_id }}"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_host

    - name: Add Windows host to inventory
      ansible.builtin.uri:
        url: "{{ aap_api }}/hosts/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "{{ windows_private_ip }}"
          inventory: "{{ inventory_id }}"
          variables: |
            ansible_connection: winrm
            ansible_winrm_transport: ntlm
            ansible_winrm_server_cert_validation: ignore
            ansible_port: 5986
            ansible_winrm_scheme: https
        status_code: [200, 201]
      when: existing_host.json.count == 0

    - name: Get existing windows group in inventory
      ansible.builtin.uri:
        url: "{{ aap_api }}/groups/?name=windows&inventory={{ inventory_id }}"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_group

    - name: Create windows group in inventory
      ansible.builtin.uri:
        url: "{{ aap_api }}/groups/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: windows
          inventory: "{{ inventory_id }}"
        status_code: [200, 201]
      register: group_result
      when: existing_group.json.count == 0

    - name: Set group ID fact
      ansible.builtin.set_fact:
        group_id: >-
          {{
            group_result.json.id
            if existing_group.json.count == 0
            else existing_group.json.results[0].id
          }}

    - name: Add Windows host to windows group
      ansible.builtin.uri:
        url: "{{ aap_api }}/groups/{{ group_id }}/hosts/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "{{ windows_private_ip }}"
          inventory: "{{ inventory_id }}"
        status_code: [200, 201, 204]
      failed_when: false

    # ---------------------------------------------------------------
    # Project
    # ---------------------------------------------------------------
    - name: Get existing Windows Cert Rotation project
      ansible.builtin.uri:
        url: "{{ aap_api }}/projects/?name=Windows+Cert+Rotation"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_project

    - name: Create AAP project from GitHub repo
      ansible.builtin.uri:
        url: "{{ aap_api }}/projects/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "Windows Cert Rotation"
          description: "Playbooks for Windows certificate rotation demo"
          organization: 1
          scm_type: git
          scm_url: "{{ git_repo_url }}"
          scm_branch: main
          scm_update_on_launch: true
          scm_clean: true
        status_code: [200, 201]
      register: project_result
      when: existing_project.json.count == 0

    - name: Set project ID fact
      ansible.builtin.set_fact:
        project_id: >-
          {{
            project_result.json.id
            if existing_project.json.count == 0
            else existing_project.json.results[0].id
          }}

    - name: Wait for project sync to complete
      ansible.builtin.uri:
        url: "{{ aap_api }}/projects/{{ project_id }}/"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: project_status
      until: project_status.json.status in ['successful', 'failed', 'canceled']
      retries: 20
      delay: 15

    - name: Assert project sync succeeded
      ansible.builtin.assert:
        that: project_status.json.status == 'successful'
        fail_msg: "Project sync failed. Check the AAP UI for details."

    # ---------------------------------------------------------------
    # Job Template
    # ---------------------------------------------------------------
    - name: Get existing Rotate Windows Certificate job template
      ansible.builtin.uri:
        url: "{{ aap_api }}/job_templates/?name=Rotate+Windows+Certificate"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_jt

    - name: Create Rotate Windows Certificate job template
      ansible.builtin.uri:
        url: "{{ aap_api }}/job_templates/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "Rotate Windows Certificate"
          description: "Rotates an expiring IIS certificate when triggered by EDA"
          organization: 1
          project: "{{ project_id }}"
          playbook: "playbooks/rotate_certificate.yml"
          inventory: "{{ inventory_id }}"
          ask_variables_on_launch: true
          extra_vars: "cert_dns_name: demo.contoso.com"
        status_code: [200, 201]
      register: jt_result
      when: existing_jt.json.count == 0

    - name: Set job template ID fact
      ansible.builtin.set_fact:
        jt_id: >-
          {{
            jt_result.json.id
            if existing_jt.json.count == 0
            else existing_jt.json.results[0].id
          }}

    - name: Associate credential with job template
      ansible.builtin.uri:
        url: "{{ aap_api }}/job_templates/{{ jt_id }}/credentials/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          id: "{{ credential_id }}"
        status_code: [200, 201, 204]
      failed_when: false

    # ---------------------------------------------------------------
    # AI Risk Analysis Job Template
    # ---------------------------------------------------------------
    - name: Get existing AI Certificate Risk Analysis job template
      ansible.builtin.uri:
        url: "{{ aap_api }}/job_templates/?name=AI+Certificate+Risk+Analysis"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_ai_jt

    - name: Create AI Certificate Risk Analysis job template
      ansible.builtin.uri:
        url: "{{ aap_api }}/job_templates/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "AI Certificate Risk Analysis"
          description: "AI-powered risk analysis that decides whether to proceed, schedule, or escalate certificate rotation"
          organization: 1
          project: "{{ project_id }}"
          playbook: "playbooks/ai_risk_analysis.yml"
          inventory: "{{ inventory_id }}"
          ask_variables_on_launch: true
          extra_vars: "cert_dns_name: demo.contoso.com"
        status_code: [200, 201]
      register: ai_jt_result
      when: existing_ai_jt.json.count == 0

    - name: Set AI job template ID fact
      ansible.builtin.set_fact:
        ai_jt_id: >-
          {{
            ai_jt_result.json.id
            if existing_ai_jt.json.count == 0
            else existing_ai_jt.json.results[0].id
          }}

    - name: Associate Windows credential with AI job template
      ansible.builtin.uri:
        url: "{{ aap_api }}/job_templates/{{ ai_jt_id }}/credentials/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          id: "{{ credential_id }}"
        status_code: [200, 201, 204]
      failed_when: false

    - name: Associate GCP Service Account credential with AI job template
      ansible.builtin.uri:
        url: "{{ aap_api }}/job_templates/{{ ai_jt_id }}/credentials/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          id: "{{ gcp_cred_id | int }}"
        status_code: [200, 201, 204]
      failed_when: false
      when: gcp_cred_id | default('') | length > 0

    - name: Get existing Controller API credential type
      ansible.builtin.uri:
        url: "{{ aap_api }}/credential_types/?name=Controller+API"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_ctrl_cred_type

    - name: Create Controller API credential type
      ansible.builtin.uri:
        url: "{{ aap_api }}/credential_types/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "Controller API"
          description: "Injects controller host, username, and password as env vars for job-to-job API calls"
          kind: "cloud"
          inputs:
            fields:
              - id: controller_host
                type: string
                label: "Controller Host URL"
              - id: controller_username
                type: string
                label: "Controller Username"
              - id: controller_password
                type: string
                label: "Controller Password"
                secret: true
            required:
              - controller_host
              - controller_username
              - controller_password
          injectors:
            env:
              CONTROLLER_HOST: "{{ '{{' }} controller_host {{ '}}' }}"
              CONTROLLER_USERNAME: "{{ '{{' }} controller_username {{ '}}' }}"
              CONTROLLER_PASSWORD: "{{ '{{' }} controller_password {{ '}}' }}"
        status_code: [200, 201]
      register: ctrl_cred_type_result
      when: existing_ctrl_cred_type.json.count == 0

    - name: Set Controller API credential type ID
      ansible.builtin.set_fact:
        ctrl_cred_type_id: >-
          {{
            ctrl_cred_type_result.json.id
            if existing_ctrl_cred_type.json.count == 0
            else existing_ctrl_cred_type.json.results[0].id
          }}

    - name: Get existing Controller API credential
      ansible.builtin.uri:
        url: "{{ aap_api }}/credentials/?name=Controller+API+Credential"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_ctrl_cred

    - name: Create Controller API credential
      ansible.builtin.uri:
        url: "{{ aap_api }}/credentials/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "Controller API Credential"
          description: "Allows job templates to call back to the controller API"
          organization: 1
          credential_type: "{{ ctrl_cred_type_id }}"
          inputs:
            controller_host: "{{ aap_base_url }}"
            controller_username: "{{ aap_username }}"
            controller_password: "{{ aap_password }}"
        status_code: [200, 201]
      register: ctrl_cred_result
      when: existing_ctrl_cred.json.count == 0

    - name: Set Controller API credential ID fact
      ansible.builtin.set_fact:
        controller_api_cred_id: >-
          {{
            ctrl_cred_result.json.id
            if existing_ctrl_cred.json.count == 0
            else existing_ctrl_cred.json.results[0].id
          }}

    - name: Associate Controller API credential with AI job template
      ansible.builtin.uri:
        url: "{{ aap_api }}/job_templates/{{ ai_jt_id }}/credentials/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          id: "{{ controller_api_cred_id | int }}"
        status_code: [200, 201, 204]
      failed_when: false

    # ---------------------------------------------------------------
    # EDA Configuration
    # ---------------------------------------------------------------
    - name: Get AAP gateway auth token for EDA API
      ansible.builtin.uri:
        url: "{{ aap_base_url }}/api/gateway/v1/tokens/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          description: "EDA config token"
        status_code: [200, 201]
      register: aap_token_result

    - name: Set auth token fact
      ansible.builtin.set_fact:
        aap_token: "{{ aap_token_result.json.token }}"

    - name: Get existing EDA project
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/?name=Windows+Cert+Rotation+EDA"
        method: GET
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_eda_project

    - name: Create EDA project
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/"
        method: POST
        headers:
          Authorization: "Bearer {{ aap_token }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "Windows Cert Rotation EDA"
          url: "{{ git_repo_url }}"
          description: "EDA rulebooks for Windows cert rotation demo"
          organization_id: 1
        validate_certs: "{{ aap_validate_certs }}"
        status_code: [200, 201]
      register: eda_project_result
      when: existing_eda_project.json.count == 0

    - name: Set EDA project ID fact
      ansible.builtin.set_fact:
        eda_project_id: >-
          {{
            eda_project_result.json.id
            if existing_eda_project.json.count == 0
            else existing_eda_project.json.results[0].id
          }}

    - name: Wait for EDA project sync to complete
      ansible.builtin.uri:
        url: "{{ eda_api }}/projects/{{ eda_project_id }}/"
        method: GET
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: eda_project_status
      until: eda_project_status.json.import_state in ['completed', 'failed']
      retries: 20
      delay: 15

    - name: Assert EDA project sync succeeded
      ansible.builtin.assert:
        that: eda_project_status.json.import_state == 'completed'
        fail_msg: "EDA project sync failed. Check the EDA UI for details."

    # ---------------------------------------------------------------
    # EDA Webhook Credential + Event Stream
    # ---------------------------------------------------------------
    - name: Get existing EDA webhook credential
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/?name=Windows+Cert+Webhook+Credential"
        method: GET
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_webhook_cred

    - name: Create EDA webhook credential (Basic Event Stream type)
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/"
        method: POST
        headers:
          Authorization: "Bearer {{ aap_token }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "Windows Cert Webhook Credential"
          description: "Basic auth credential for cert expiry webhook"
          credential_type_id: 7
          organization_id: 1
          inputs:
            auth_type: basic
            username: webhook
            password: "Demo-EDA-Cert-2026!"
            http_header_key: Authorization
        validate_certs: "{{ aap_validate_certs }}"
        status_code: [200, 201]
      register: webhook_cred_result
      when: existing_webhook_cred.json.count == 0

    - name: Set webhook credential ID fact
      ansible.builtin.set_fact:
        webhook_cred_id: >-
          {{
            webhook_cred_result.json.id
            if existing_webhook_cred.json.count == 0
            else existing_webhook_cred.json.results[0].id
          }}

    - name: Get existing EDA event stream
      ansible.builtin.uri:
        url: "{{ eda_api }}/event-streams/?name=Windows+Cert+Expiry+Stream"
        method: GET
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_eda_stream

    - name: Create EDA event stream
      ansible.builtin.uri:
        url: "{{ eda_api }}/event-streams/"
        method: POST
        headers:
          Authorization: "Bearer {{ aap_token }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "Windows Cert Expiry Stream"
          organization_id: 1
          eda_credential_id: "{{ webhook_cred_id }}"
        validate_certs: "{{ aap_validate_certs }}"
        status_code: [200, 201]
      register: eda_stream_result
      when: existing_eda_stream.json.count == 0

    - name: Set EDA stream facts
      ansible.builtin.set_fact:
        eda_stream_id: >-
          {{
            eda_stream_result.json.id
            if existing_eda_stream.json.count == 0
            else existing_eda_stream.json.results[0].id
          }}
        eda_event_stream_url: >-
          {{
            eda_stream_result.json.url | default('')
            if existing_eda_stream.json.count == 0
            else existing_eda_stream.json.results[0].url | default('')
          }}

    - name: Append EDA event stream URL to .env.demo
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../.env.demo"
        line: 'export EDA_EVENT_STREAM_URL="{{ eda_event_stream_url }}"'
        regexp: '^export EDA_EVENT_STREAM_URL='
        create: no

    - name: Append EDA webhook credentials to .env.demo
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../.env.demo"
        line: 'export EDA_WEBHOOK_USER="webhook"'
        regexp: '^export EDA_WEBHOOK_USER='
        create: no

    - name: Append EDA webhook password to .env.demo
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../.env.demo"
        line: 'export EDA_WEBHOOK_PASS="Demo-EDA-Cert-2026!"'
        regexp: '^export EDA_WEBHOOK_PASS='
        create: no

    - name: Get available decision environments
      ansible.builtin.uri:
        url: "{{ eda_api }}/decision-environments/"
        method: GET
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: eda_de_result

    - name: Set decision environment ID fact (use Default DE)
      ansible.builtin.set_fact:
        eda_de_id: "{{ eda_de_result.json.results | selectattr('name', 'equalto', 'Default Decision Environment') | map(attribute='id') | first | default(eda_de_result.json.results[0].id) }}"

    - name: Look up EDA rulebook ID for cert_expiry_watcher.yml
      ansible.builtin.uri:
        url: "{{ eda_api }}/rulebooks/?project_id={{ eda_project_id }}&name=cert_expiry_watcher.yml"
        method: GET
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: rulebook_result

    - name: Set rulebook ID fact
      ansible.builtin.set_fact:
        eda_rulebook_id: "{{ rulebook_result.json.results[0].id }}"

    - name: Look up rulebook source names
      ansible.builtin.uri:
        url: "{{ eda_api }}/rulebooks/{{ eda_rulebook_id }}/sources/"
        method: GET
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: rulebook_sources

    - name: Set rulebook source name and hash facts
      ansible.builtin.set_fact:
        eda_source_name: "{{ rulebook_sources.json.results[0].name }}"
        eda_rulebook_hash: "{{ rulebook_sources.json.results[0].rulebook_hash }}"

    - name: Get existing AAP controller credential for EDA
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/?name=AAP+Controller+Credential"
        method: GET
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_aap_cred

    - name: Create AAP controller credential for EDA
      ansible.builtin.uri:
        url: "{{ eda_api }}/eda-credentials/"
        method: POST
        headers:
          Authorization: "Bearer {{ aap_token }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "AAP Controller Credential"
          description: "Allows EDA to trigger AAP job templates"
          credential_type_id: 4
          organization_id: 1
          inputs:
            host: "https://{{ lookup('env', 'AAP_HOSTNAME') }}/api/controller/"
            username: "{{ aap_username }}"
            password: "{{ aap_password }}"
            verify_ssl: false
        validate_certs: "{{ aap_validate_certs }}"
        status_code: [200, 201]
      register: aap_cred_result
      when: existing_aap_cred.json.count == 0

    - name: Set AAP controller credential ID fact
      ansible.builtin.set_fact:
        aap_eda_cred_id: >-
          {{
            aap_cred_result.json.id
            if existing_aap_cred.json.count == 0
            else existing_aap_cred.json.results[0].id
          }}

    - name: Get existing EDA rulebook activation
      ansible.builtin.uri:
        url: "{{ eda_api }}/activations/?name=Windows+Cert+Expiry+Watcher"
        method: GET
        headers:
          Authorization: "Bearer {{ aap_token }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: existing_activation

    - name: Create EDA rulebook activation
      ansible.builtin.uri:
        url: "{{ eda_api }}/activations/"
        method: POST
        headers:
          Authorization: "Bearer {{ aap_token }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "Windows Cert Expiry Watcher"
          description: "Watches for cert expiry events and triggers rotation"
          project_id: "{{ eda_project_id }}"
          rulebook_id: "{{ eda_rulebook_id }}"
          decision_environment_id: "{{ eda_de_id }}"
          organization_id: 1
          is_enabled: true
          eda_credentials:
            - "{{ aap_eda_cred_id }}"
          source_mappings: >-
            [{"source_name": "{{ eda_source_name }}",
              "event_stream_id": {{ eda_stream_id }},
              "event_stream_name": "Windows Cert Expiry Stream",
              "rulebook_hash": "{{ eda_rulebook_hash }}"}]
        validate_certs: "{{ aap_validate_certs }}"
        status_code: [200, 201]
      when: existing_activation.json.count == 0

    # ---------------------------------------------------------------
    # Summary
    # ---------------------------------------------------------------
    - name: Display AAP configuration summary
      ansible.builtin.debug:
        msg: |
          =============================================
          AAP Configuration Complete!
          =============================================
          Controller UI:     {{ aap_base_url }}
          Job Template:      Rotate Windows Certificate
          EDA Activation:    Windows Cert Expiry Watcher
          Event Stream URL:  {{ eda_event_stream_url }}

          To fire a test event:
            source .env.demo
            bash scripts/send_test_event.sh
          =============================================
