---
- name: Tear down all demo AWS resources
  hosts: localhost
  connection: local
  gather_facts: yes

  tasks:
    - name: Load .env.demo to get region and instance info
      ansible.builtin.shell:
        cmd: "source {{ playbook_dir }}/../.env.demo && echo $AAP_REGION"
      register: region_result
      changed_when: false
      failed_when: false

    - name: Set region fact from .env.demo
      ansible.builtin.set_fact:
        demo_region: "{{ region_result.stdout | trim }}"
      when: region_result.stdout | trim | length > 0

    - name: Fallback — resolve region from AAP hostname if .env.demo missing
      when: demo_region is not defined or demo_region | length == 0
      block:
        - name: Resolve AAP hostname to IP
          ansible.builtin.shell:
            cmd: "getent hosts {{ lookup('env', 'AAP_HOSTNAME') }} | awk '{print $1}'"
          register: aap_ip_fallback
          changed_when: false

        - name: Find AAP instance to get region
          amazon.aws.ec2_instance_info:
            filters:
              "private-ip-address": "{{ aap_ip_fallback.stdout | trim }}"
          register: aap_ec2_fallback

        - name: Set region from AAP instance AZ
          ansible.builtin.set_fact:
            demo_region: "{{ aap_ec2_fallback.instances[0].placement.availability_zone[:-1] }}"

    - name: Terminate Windows demo EC2 instance
      amazon.aws.ec2_instance:
        filters:
          "tag:Name": cert-rotation-demo-windows
          "tag:Owner": atrotter
        state: absent
        region: "{{ demo_region }}"
        wait: true

    - name: Wait for instance termination to complete
      ansible.builtin.pause:
        seconds: 30

    - name: Delete demo security group
      amazon.aws.ec2_security_group:
        name: cert-rotation-demo-sg
        region: "{{ demo_region }}"
        state: absent

    - name: Delete demo key pair
      amazon.aws.ec2_key:
        name: cert-rotation-demo-key
        region: "{{ demo_region }}"
        state: absent

    - name: Remove local key file
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../cert-rotation-demo-key.pem"
        state: absent

    - name: Remove .env.demo
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../.env.demo"
        state: absent

    - name: Reset inventory/hosts.yml to placeholder
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../inventory/hosts.yml"
        content: |
          ---
          # This file is auto-populated by infrastructure/provision_aws.yml
          all:
            children:
              windows:
                hosts: {}

    - name: Display teardown summary
      ansible.builtin.debug:
        msg: "All demo AWS resources cleaned up. Owner=atrotter resources removed."
