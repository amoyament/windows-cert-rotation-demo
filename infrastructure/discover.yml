---
- name: "Phase 0: Discover existing infrastructure and AAP configuration"
  hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    aap_hostname: "{{ lookup('env', 'AAP_HOSTNAME') }}"
    my_public_ip: "{{ lookup('env', 'MY_PUBLIC_IP') | default('') }}"
    aap_protocol: "{{ lookup('env', 'AAP_PROTOCOL') | default('https') }}"
    aap_url: "{{ aap_protocol }}://{{ aap_hostname }}"
    aap_username: "{{ lookup('env', 'AAP_USERNAME') }}"
    aap_password: "{{ lookup('env', 'AAP_PASSWORD') }}"
    aap_validate_certs: "{{ lookup('env', 'AAP_VALIDATE_CERTS') | default(false) }}"

  tasks:
    # -----------------------------------------------------------------
    # Validate environment
    # -----------------------------------------------------------------
    - name: Assert AAP_HOSTNAME is set
      ansible.builtin.assert:
        that: aap_hostname | length > 0
        fail_msg: "AAP_HOSTNAME not set. Run: export AAP_HOSTNAME=your-aap-url.example.com"

    # -----------------------------------------------------------------
    # AWS Discovery: Find AAP instance and extract network info
    # -----------------------------------------------------------------
    - name: Resolve AAP hostname to IP
      ansible.builtin.shell:
        cmd: "getent hosts {{ aap_hostname }} | awk '{print $1}'"
      register: aap_ip_result
      changed_when: false

    - name: Assert AAP hostname resolved
      ansible.builtin.assert:
        that: aap_ip_result.stdout | length > 0
        fail_msg: "Cannot resolve {{ aap_hostname }}. Check DNS."

    - name: Set AAP IP fact
      ansible.builtin.set_fact:
        aap_ip: "{{ aap_ip_result.stdout | trim }}"

    - name: Find AAP EC2 instance by private IP
      amazon.aws.ec2_instance_info:
        filters:
          private-ip-address: "{{ aap_ip }}"
      register: aap_instance_private

    - name: Find AAP EC2 instance by public IP (fallback)
      amazon.aws.ec2_instance_info:
        filters:
          ip-address: "{{ aap_ip }}"
      register: aap_instance_public
      when: aap_instance_private.instances | length == 0

    - name: Set AAP instance fact
      ansible.builtin.set_fact:
        aap_instance: "{{ (aap_instance_private.instances + (aap_instance_public.instances | default([]))) | first }}"

    - name: Assert AAP EC2 instance found
      ansible.builtin.assert:
        that: aap_instance is defined
        fail_msg: "Could not find EC2 instance for {{ aap_hostname }}. Ensure AAP runs in this AWS account/region."

    - name: Extract AAP network details
      ansible.builtin.set_fact:
        aap_vpc_id: "{{ aap_instance.vpc_id }}"
        aap_subnet_id: "{{ aap_instance.subnet_id }}"
        aap_az: "{{ aap_instance.placement.availability_zone }}"
        aap_region: "{{ aap_instance.placement.availability_zone | regex_replace('.$', '') }}"
        aap_private_ip: "{{ aap_instance.private_ip_address }}"

    - name: Display AAP network info
      ansible.builtin.debug:
        msg: |
          AAP Instance Network:
            VPC: {{ aap_vpc_id }}
            Subnet: {{ aap_subnet_id }}
            Region: {{ aap_region }}
            AAP Private IP: {{ aap_private_ip }}

    # -----------------------------------------------------------------
    # AWS Discovery: Find existing Windows demo VM
    # -----------------------------------------------------------------
    - name: Search for existing Windows demo VM by tags
      amazon.aws.ec2_instance_info:
        filters:
          "tag:Owner": "atrotter"
          "tag:Purpose": "cert-rotation-demo"
          instance-state-name:
            - running
            - stopped
        region: "{{ aap_region }}"
      register: existing_windows_search

    - name: Set Windows VM facts (if found)
      ansible.builtin.set_fact:
        windows_vm_exists: true
        windows_instance_id: "{{ existing_windows_search.instances[0].instance_id }}"
        windows_public_ip: "{{ existing_windows_search.instances[0].public_ip_address | default('') }}"
        windows_private_ip: "{{ existing_windows_search.instances[0].private_ip_address }}"
        windows_state: "{{ existing_windows_search.instances[0].state.name }}"
      when: existing_windows_search.instances | length > 0

    - name: Set Windows VM not found
      ansible.builtin.set_fact:
        windows_vm_exists: false
        windows_instance_id: ""
        windows_public_ip: ""
        windows_private_ip: ""
        windows_state: "absent"
      when: existing_windows_search.instances | length == 0

    - name: Display Windows VM status
      ansible.builtin.debug:
        msg: "Windows VM: {{ 'Found (' + windows_public_ip + ', ' + windows_state + ')' if windows_vm_exists else 'Not found' }}"

    - name: Start stopped Windows VM
      amazon.aws.ec2_instance:
        instance_ids:
          - "{{ windows_instance_id }}"
        state: running
        wait: yes
        region: "{{ aap_region }}"
      when: windows_vm_exists and windows_state == 'stopped'
      register: started_vm

    - name: Update public IP after starting VM
      amazon.aws.ec2_instance_info:
        instance_ids:
          - "{{ windows_instance_id }}"
        region: "{{ aap_region }}"
      register: refreshed_vm_info
      when: windows_vm_exists and windows_state == 'stopped'

    - name: Set refreshed public IP
      ansible.builtin.set_fact:
        windows_public_ip: "{{ refreshed_vm_info.instances[0].public_ip_address }}"
      when: refreshed_vm_info is defined and refreshed_vm_info.instances | default([]) | length > 0

    - name: Check for local key pair file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../cert-rotation-demo-key.pem"
      register: key_file_stat

    - name: Decrypt Windows admin password
      community.aws.ec2_win_password:
        instance_id: "{{ windows_instance_id }}"
        key_file: "{{ playbook_dir }}/../cert-rotation-demo-key.pem"
        wait: yes
        wait_timeout: 30
        region: "{{ aap_region }}"
      register: win_password_result
      when: windows_vm_exists and key_file_stat.stat.exists
      ignore_errors: true

    - name: Set admin password fact
      ansible.builtin.set_fact:
        windows_admin_password: "{{ win_password_result.win_password | default('') }}"
      when: win_password_result is defined and win_password_result is not failed

    - name: Test WinRM connectivity
      ansible.builtin.wait_for:
        host: "{{ windows_public_ip }}"
        port: 5986
        timeout: 30
      when: windows_vm_exists and windows_public_ip | length > 0
      register: winrm_check
      ignore_errors: true

    - name: Set WinRM reachable fact
      ansible.builtin.set_fact:
        winrm_reachable: "{{ winrm_check is not failed }}"
      when: windows_vm_exists

    - name: Set WinRM not reachable when VM absent
      ansible.builtin.set_fact:
        winrm_reachable: false
      when: not windows_vm_exists

    # -----------------------------------------------------------------
    # Write .env.demo
    # -----------------------------------------------------------------
    - name: Write .env.demo with discovered values
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../.env.demo"
        content: |
          export WINDOWS_PUBLIC_IP="{{ windows_public_ip }}"
          export WINDOWS_PRIVATE_IP="{{ windows_private_ip }}"
          export WINDOWS_ADMIN_PASSWORD="{{ windows_admin_password | default('') }}"
          export WINDOWS_INSTANCE_ID="{{ windows_instance_id }}"
          export AAP_VPC_ID="{{ aap_vpc_id }}"
          export AAP_SUBNET_ID="{{ aap_subnet_id }}"
          export AAP_REGION="{{ aap_region }}"
          export AAP_PRIVATE_IP="{{ aap_private_ip }}"
        mode: "0600"
      when: windows_vm_exists

    - name: Update inventory/hosts.yml
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../inventory/hosts.yml"
        content: |
          ---
          # Auto-generated by infrastructure/discover.yml
          # ansible_host uses public IP for local runs; AAP connects via private IP
          all:
            children:
              windows:
                hosts:
                  {{ windows_private_ip }}:
                    ansible_host: {{ windows_public_ip }}
                    ansible_user: Administrator
                    ansible_password: "{{ windows_admin_password | default('REPLACE_ME') }}"
      when: windows_vm_exists and windows_public_ip | length > 0

    - name: Add Windows host to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ windows_private_ip }}"
        groups: windows
        ansible_host: "{{ windows_public_ip }}"
        ansible_user: Administrator
        ansible_password: "{{ windows_admin_password | default('') }}"
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5986
        ansible_winrm_scheme: https
      when: windows_vm_exists and winrm_reachable

# -----------------------------------------------------------------
# Play 2: Windows VM State Audit
# -----------------------------------------------------------------
- name: "Audit Windows VM state"
  hosts: windows
  gather_facts: no
  vars_files:
    - ../vars/demo_vars.yml

  tasks:
    - name: Check if IIS is installed
      ansible.windows.win_shell: |
        (Get-WindowsFeature Web-Server).Installed
      register: iis_check
      ignore_errors: true

    - name: Set IIS installed fact
      ansible.builtin.set_fact:
        iis_installed: "{{ iis_check.stdout | default('') | trim | lower == 'true' }}"

    - name: Check IIS HTTPS binding
      ansible.windows.win_shell: |
        Import-Module WebAdministration
        $binding = Get-WebBinding -Name "Default Web Site" -Protocol https -ErrorAction SilentlyContinue
        if ($binding) {
            $binding.certificateHash
        } else {
            Write-Output "NONE"
        }
      register: https_binding_check
      ignore_errors: true

    - name: Set HTTPS binding facts
      ansible.builtin.set_fact:
        https_binding_exists: "{{ https_binding_check.stdout | default('NONE') | trim != 'NONE' }}"
        current_bound_thumbprint: "{{ https_binding_check.stdout | default('') | trim }}"

    - name: Check for demo certificates
      ansible.windows.win_shell: |
        $certs = Get-ChildItem Cert:\LocalMachine\My | Where-Object {
            $_.Subject -like "*{{ cert_dns_name }}*"
        }
        foreach ($cert in $certs) {
            $expired = if ($cert.NotAfter -lt (Get-Date)) { "EXPIRED" } else { "VALID" }
            Write-Output "$($cert.Thumbprint) | $($cert.Subject) | $($cert.NotAfter) | $expired"
        }
        if (-not $certs) { Write-Output "NONE" }
      register: cert_check
      ignore_errors: true

    - name: Set cert facts
      ansible.builtin.set_fact:
        demo_certs_exist: "{{ cert_check.stdout | default('NONE') | trim != 'NONE' }}"

    - name: Check monitoring script
      ansible.windows.win_stat:
        path: C:\Scripts\send_cert_event.ps1
      register: monitoring_script_check

    - name: Set monitoring script fact
      ansible.builtin.set_fact:
        monitoring_script_deployed: "{{ monitoring_script_check.stat.exists | default(false) }}"

    - name: Display Windows VM audit results
      ansible.builtin.debug:
        msg: |
          Windows VM State Audit:
            IIS: {{ 'Installed' if iis_installed else 'Not installed' }}
            HTTPS Binding: {{ 'Configured (' + current_bound_thumbprint + ')' if https_binding_exists else 'Not configured' }}
            Demo Certs: {{ cert_check.stdout | default('NONE') | trim }}
            Monitoring Script: {{ 'Deployed' if monitoring_script_deployed else 'Not deployed' }}

# -----------------------------------------------------------------
# Play 3: AAP Discovery
# -----------------------------------------------------------------
- name: "Discover AAP configuration"
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    aap_base_url: "https://{{ lookup('env', 'AAP_HOSTNAME') }}"
    aap_username: "{{ lookup('env', 'AAP_USERNAME') }}"
    aap_password: "{{ lookup('env', 'AAP_PASSWORD') }}"
    aap_validate_certs: false
    controller_api: "{{ aap_base_url }}/api/controller/v2"
    eda_api: "{{ aap_base_url }}/api/eda/v1"

  tasks:
    - name: Check Windows Demo Inventory
      ansible.builtin.uri:
        url: "{{ controller_api }}/inventories/?name=Windows+Demo+Inventory"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: inv_check
      ignore_errors: true

    - name: Check Windows Demo Credential
      ansible.builtin.uri:
        url: "{{ controller_api }}/credentials/?name=Windows+Demo+Credential"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: cred_check
      ignore_errors: true

    - name: Check Windows Cert Rotation project
      ansible.builtin.uri:
        url: "{{ controller_api }}/projects/?name=Windows+Cert+Rotation"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: proj_check
      ignore_errors: true

    - name: Check Rotate Windows Certificate job template
      ansible.builtin.uri:
        url: "{{ controller_api }}/job_templates/?name=Rotate+Windows+Certificate"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: jt_check
      ignore_errors: true

    - name: Check EDA activations
      ansible.builtin.uri:
        url: "{{ eda_api }}/activations/?name=Windows+Cert+Expiry+Watcher"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: eda_activation_check
      ignore_errors: true

    - name: Check EDA event streams
      ansible.builtin.uri:
        url: "{{ eda_api }}/event-streams/?name=Windows+Cert+Expiry+Stream"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: yes
        validate_certs: "{{ aap_validate_certs }}"
      register: eda_stream_check
      ignore_errors: true

    - name: Set AAP discovery facts
      ansible.builtin.set_fact:
        aap_inventory_exists: "{{ (inv_check.json.count | default(0)) > 0 }}"
        aap_credential_exists: "{{ (cred_check.json.count | default(0)) > 0 }}"
        aap_project_exists: "{{ (proj_check.json.count | default(0)) > 0 }}"
        aap_jt_exists: "{{ (jt_check.json.count | default(0)) > 0 }}"
        eda_activation_exists: "{{ (eda_activation_check.json.count | default(0)) > 0 }}"
        eda_stream_exists: "{{ (eda_stream_check.json.count | default(0)) > 0 }}"
        eda_event_stream_url: "{{ eda_stream_check.json.results[0].url | default('') if (eda_stream_check.json.count | default(0)) > 0 else '' }}"

    - name: Append EDA info to .env.demo
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../.env.demo"
        line: 'export EDA_EVENT_STREAM_URL="{{ eda_event_stream_url }}"'
        regexp: '^export EDA_EVENT_STREAM_URL='
        create: no
      when: eda_event_stream_url | length > 0

    # -----------------------------------------------------------------
    # Discovery Report
    # -----------------------------------------------------------------
    - name: Build discovery report
      ansible.builtin.set_fact:
        discovery_report: |
          =============================================
          Discovery Report
          =============================================

          AWS Infrastructure:
            AAP Instance: Found ({{ hostvars['localhost']['aap_private_ip'] | default('unknown') }})
            VPC: {{ hostvars['localhost']['aap_vpc_id'] | default('unknown') }}
            Windows VM: {{ 'Found (' + hostvars['localhost']['windows_public_ip'] + ')' if hostvars['localhost']['windows_vm_exists'] | default(false) else 'Not found, will provision' }}
            WinRM: {{ 'Reachable' if hostvars['localhost']['winrm_reachable'] | default(false) else 'Not reachable' }}

          Windows VM State:
            IIS: {{ 'Installed' if hostvars[hostvars['localhost']['windows_private_ip']]['iis_installed'] | default(false) else 'Not installed' }}
            HTTPS Binding: {{ 'Configured' if hostvars[hostvars['localhost']['windows_private_ip']]['https_binding_exists'] | default(false) else 'Not configured' }}
            Demo Certs: {{ 'Found' if hostvars[hostvars['localhost']['windows_private_ip']]['demo_certs_exist'] | default(false) else 'Not found' }}
            Monitoring Script: {{ 'Deployed' if hostvars[hostvars['localhost']['windows_private_ip']]['monitoring_script_deployed'] | default(false) else 'Not deployed' }}

          AAP Configuration:
            Inventory: {{ 'Exists' if aap_inventory_exists else 'Missing' }}
            Credential: {{ 'Exists' if aap_credential_exists else 'Missing' }}
            Project: {{ 'Exists' if aap_project_exists else 'Missing' }}
            Job Template: {{ 'Exists' if aap_jt_exists else 'Missing' }}
            EDA Activation: {{ 'Exists' if eda_activation_exists else 'Missing' }}
            EDA Event Stream: {{ 'Exists (' + eda_event_stream_url + ')' if eda_stream_exists else 'Missing' }}

          Actions Required:
          {% if not hostvars['localhost']['windows_vm_exists'] | default(false) %}
            - Provision Windows VM (run infrastructure/provision_aws.yml)
          {% endif %}
          {% if not hostvars[hostvars['localhost']['windows_private_ip']]['iis_installed'] | default(false) %}
            - Install IIS and create demo certs (run playbooks/setup_iis.yml)
          {% endif %}
          {% if not aap_inventory_exists or not aap_credential_exists or not aap_project_exists or not aap_jt_exists %}
            - Configure AAP objects (run configure_aap/configure_aap.yml)
          {% endif %}
          {% if not eda_activation_exists or not eda_stream_exists %}
            - Configure EDA (run configure_aap/configure_aap.yml)
          {% endif %}
          =============================================

    - name: Write discovery report to file
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../discovery_report.txt"
        content: "{{ discovery_report }}"
      delegate_to: localhost

    - name: Display discovery report
      ansible.builtin.debug:
        msg: "{{ discovery_report }}"
